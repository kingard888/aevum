name: Stale Issues Management

on:
  schedule:
    # Check for stale issues weekly
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
    - name: Manage stale issues and PRs
      uses: actions/stale@v8
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        
        # Issues configuration
        stale-issue-message: |
          This issue has been inactive for 30 days. 
          If this is still relevant, please comment to keep it open.
          Otherwise it will be closed in 7 days.
        close-issue-message: |
          Closing due to inactivity.
          Feel free to reopen if you'd like to continue discussion.
        stale-issue-label: 'stale'
        days-before-issue-stale: 30
        days-before-issue-close: 7
        
        # Pull requests configuration
        stale-pr-message: |
          This PR has been inactive for 30 days.
          Please update it or it will be closed.
        close-pr-message: |
          Closing due to inactivity.
          Feel free to reopen when ready.
        stale-pr-label: 'stale'
        days-before-pr-stale: 30
        days-before-pr-close: 7
        
        # Exempt labels and milestones
        exempt-issue-labels: 'pinned,security,enhancement,bug,core'
        exempt-pr-labels: 'pinned,work-in-progress,ready-for-review'
        