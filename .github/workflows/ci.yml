# CI configuration for AevumDB.
# This workflow focuses on rapid Linux-based verification.

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential clang-tools clang-format cargo rustfmt ninja-build ccache

    - name: Configure ccache
      uses: actions/cache@v5
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    - name: Make scripts executable
      run: chmod +x ./scripts/*.sh ./scripts/*/*.sh

    - name: Run Full Lifecycle Check
      run: |
        # Simulate the installation lifecycle (excluding the final system deployment)
        ./scripts/format.sh --check
        ./scripts/build.sh
        ./scripts/lint.sh
        ./scripts/test.sh

    - name: Verify artifacts
      run: |
        ls -lh build/bin/aevumdb
        ls -lh build/bin/aevumsh
        ./build/bin/aevumdb --help
